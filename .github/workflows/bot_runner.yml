name: Telegram FunsDiia Bot 6h-Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: funs-diia-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 365

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot==20.7 \
                      python-dotenv==1.0.0 \
                      pytz==2023.3 \
                      asyncpg==0.29.0

      - name: 🗄️ Setup PostgreSQL
        run: |
          # Создаем файл .env из секретов
          cat > .env << EOF
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_USER_ID=${{ secrets.ADMIN_USER_ID }}
          NOTIFICATION_CHAT_ID=${{ secrets.NOTIFICATION_CHAT_ID }}
          BOT_USERNAME=${{ secrets.BOT_USERNAME }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          EOF
          
          # Создаем директорию для данных (для совместимости)
          mkdir -p data

      - name: 🏗️ Initialize Database
        run: |
          python setup_db.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: 🚀 Run Bot (5h 50m)
        run: |
          # Запускаем бота
          python bot_main.py
        timeout-minutes: 350
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          NOTIFICATION_CHAT_ID: ${{ secrets.NOTIFICATION_CHAT_ID }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: 💾 Backup Database
        if: always()
        run: |
          # Создаем бэкап базы данных в JSON формате
          python backup_db.py
          
          # Создаем директорию для бэкапов
          mkdir -p backups
          
          # Копируем бэкап
          cp database_backup_*.json backups/ 2>/dev/null || true
          
          # Удаляем старые бэкапы (оставляем последние 10)
          cd backups && ls -t | tail -n +11 | xargs -r rm && cd ..

      - name: 💾 Save & Push Data
        if: always()
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          # Создаем временную копию новых данных
          mkdir -p temp_data
          cp -r backups temp_data/ 2>/dev/null || true
          cp *.json temp_data/ 2>/dev/null || true

          # Очищаем Git от конфликтов и затягиваем свежие изменения
          git reset --hard HEAD
          git pull --rebase origin main || true

          # Возвращаем обновленные файлы
          mkdir -p backups
          cp -r temp_data/backups/* backups/ 2>/dev/null || true
          cp temp_data/*.json . 2>/dev/null || true
          
          # Коммитим изменения
          git add backups/*.json *.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-save database backup [$(date +'%Y-%m-%d %H:%M')]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
            echo "✅ Дані успішно синхронізовано"
          else
            echo "ℹ️ Змін не виявлено"
          fi
