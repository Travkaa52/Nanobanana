name: Telegram Nano Banana Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Запуск каждые 6 часов

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем именно те библиотеки, которые вы импортируете в коде
          pip install python-telegram-bot pytz python-dotenv google-genai openai

      - name: Run Telegram Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: python -u bot.py
        # Внимание: GitHub может принудительно остановить процесс, если он висит слишком долго
        timeout-minutes: 350
