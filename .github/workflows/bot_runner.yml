name: Telegram FunsDiia Bot 6h-Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Запуск кожні 6 годин (00:00, 06:00, 12:00, 18:00)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Максимальний ліміт GitHub Actions

    steps:
      - name: 📥 Отримання коду
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🐍 Встановлення Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Встановлення залежностей
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot==20.7 python-dotenv==1.0.0 pytz==2023.3 requests==2.31.0

      - name: 📂 Підготовка даних
        run: |
          mkdir -p data
          # Копіюємо існуючі JSON у папку data
          for f in users_data.json orders_data.json feedback_data.json tariffs_data.json; do
            if [ -f "$f" ]; then cp "$f" "data/$f"; else echo '{}' > "data/$f"; fi
          done

      - name: 🚀 Запуск бота (5 годин 50 хвилин)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          GITHUB_ACTIONS: true
        run: |
          cd data
          # Запускаємо бота. Він має сам завершитись через ~350 хв
          python ../bot.py
        timeout-minutes: 352 # Даємо боту попрацювати майже 6 годин

      - name: 💾 Збереження та Push
        if: always()
        run: |
          # Повертаємо файли з data/ в корінь
          cp data/*.json . || true
          
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git add *.json
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Авто-оновлення даних [$(date +'%Y-%m-%d %H:%M')]"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git push
            echo "✅ Дані успішно синхронізовано"
          else
            echo "ℹ️ Змін немає"
          fi
