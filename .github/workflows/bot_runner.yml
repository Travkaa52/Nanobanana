name: Telegram FunsDiia Bot 6h-Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Запуск о 00:00, 06:00, 12:00, 18:00

concurrency:
  group: funs-diia-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Максимальний ліміт GitHub Actions

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Deps
        run: |
          pip install python-telegram-bot==20.7 python-dotenv pytz requests

      - name: 📂 Prepare Data
        run: |
          mkdir -p data
          for f in users_data.json orders_data.json feedback_data.json tariffs_data.json; do
            if [ -f "$f" ]; then cp "$f" "data/$f"; else echo '{}' > "data/$f"; fi
          done

      - name: 🚀 Run Bot (5h 50m)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          # ... інші секрети ...
        run: |
          cd data
          python ../py2.py
        timeout-minutes: 350 # Залишаємо 10 хв на збереження даних

      - name: 💾 Save & Push
        if: always()
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          cp data/*.json . || true
          git add *.json
          if ! git diff --cached --quiet; then
            git pull --rebase origin main
            git commit -m "🤖 Auto-save data [$(date +'%Y-%m-%d %H:%M')]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi
