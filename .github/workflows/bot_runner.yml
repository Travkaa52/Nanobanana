name: Telegram FunsDiia Bot 6h-Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: funs-diia-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Deps
        run: |
          pip install python-telegram-bot==20.7 python-dotenv pytz requests

      - name: 📂 Prepare Data
        run: |
          # Створюємо папку, якщо її немає, і копіюємо файли
          mkdir -p data
          for f in users_data.json orders_data.json feedback_data.json tariffs_data.json; do
            if [ -f "$f" ]; then cp "$f" "data/$f"; else echo '{}' > "data/$f"; fi
          done

      - name: 🚀 Run Bot (5h 50m)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        run: |
          # Запускаємо БЕЗ cd data, щоб не плутати шляхи
          # Файл py2.py має бути в корені репозиторію
          python py2.py
        timeout-minutes: 350

      - name: 💾 Save & Push
        if: always()
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Копіюємо оновлені дані з папки data назад у корінь
          cp data/*.json . || true
          
          # Додаємо файли в індекс
          git add *.json
          
          # Перевіряємо наявність змін
          if ! git diff --cached --quiet; then
            # Спочатку комітимо локальні зміни
            git commit -m "🤖 Auto-save data [$(date +'%Y-%m-%d %H:%M')]"
            
            # Тільки потім робимо pull з ребейзом, щоб злити зміни з сервера
            git pull --rebase origin main
            
            # Тепер пушимо
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
            echo "✅ Дані збережено успішно"
          else
            echo "ℹ️ Змін у JSON файлах не виявлено"
          fi
