name: Telegram FunsDiia Bot 6h-Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: funs-diia-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 365

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Deps
        run: |
          python -m pip install --upgrade pip
          # Встановлюємо всі бібліотеки, які ти імпортуєш у коді
          pip install python-telegram-bot==20.7 \
                      python-dotenv==1.0.0 \
                      pytz==2023.3 \
                      requests==2.31.0
                      
      - name: 🚀 Run Bot (5h 50m)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          NOTIFICATION_CHAT_ID: ${{ secrets.NOTIFICATION_CHAT_ID }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
        run: |
          # Запускаємо бота з кореня. 
          # ВАЖЛИВО: переконайся, що в bot.py шляхи вказані як 'data/users_data.json'
          python bot.py
        timeout-minutes: 350

      - name: 💾 Save & Push Data
        if: always()
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          # 1. Створюємо тимчасову копію нових даних
          mkdir -p temp_data
          cp data/*.json temp_data/ 2>/dev/null || true

          # 2. Очищуємо Git від конфліктів та затягуємо свіжі зміни
          git reset --hard HEAD
          git pull --rebase origin main

          # 3. Повертаємо оновлені файли в папку data/
          mkdir -p data
          cp temp_data/*.json data/ 2>/dev/null || true
          
          # 4. Комітимо саме папку data
          git add data/*.json
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-save [$(date +'%Y-%m-%d %H:%M')]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
            echo "✅ Дані успішно синхронізовано"
          else
            echo "ℹ️ Змін не виявлено"
          fi
